<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<title>空间引力 · 企业文化墙Pro</title>

<style>
body{
    margin:0;
    font-family:"Microsoft YaHei";
    background:linear-gradient(135deg,#020617,#0f172a);
    color:#fff;
}
.container{
    width:90%;
    max-width:1200px;
    margin:40px auto;
}
h1{
    text-align:center;
    background:linear-gradient(90deg,#38bdf8,#a855f7);
    -webkit-background-clip:text;
    -webkit-text-fill-color:transparent;
}
input,textarea{
    width:100%;
    margin:8px 0;
    padding:10px;
    border-radius:8px;
    border:none;
}
button{
    width:100%;
    padding:12px;
    background:linear-gradient(90deg,#38bdf8,#a855f7);
    border:none;
    border-radius:10px;
    cursor:pointer;
}
.card{
    background:rgba(255,255,255,0.05);
    padding:20px;
    margin-top:20px;
    border-radius:12px;
    position:relative;
}
.copy{
    position:absolute;
    right:15px;
    top:15px;
    background:#38bdf8;
    padding:5px 10px;
    border-radius:6px;
    cursor:pointer;
}
</style>
</head>

<body>

<div class="container">

<h1>空间引力 · 文化墙生成器</h1>

<input id="name" placeholder="企业名称">
<input id="industry" placeholder="行业">
<input id="theme" placeholder="文化主题">
<textarea id="content" placeholder="文化内容"></textarea>

<button onclick="generate()">生成20组方案</button>

<div id="result"></div>

</div>

<script>

function getStyle(industry){
    if(industry.includes("AI")||industry.includes("科技")) return "数字流光";
    if(industry.includes("制造")) return "工业齿轮";
    if(industry.includes("广告")) return "像素实验室";
    if(industry.includes("金融")) return "历史长卷";
    return "折纸艺廊";
}

function generate(){

let name=document.getElementById("name").value;
let industry=document.getElementById("industry").value;
let theme=document.getElementById("theme").value;
let content=document.getElementById("content").value;

let style=getStyle(industry);

let layouts=["流线型","阵列式","中轴对称","环绕式","分层递进","放射状","模块拼接","轴线展开","几何切割","悬浮结构"];
let materials=["亚克力+灯带","金属+蚀刻","木质+绿植","玻璃+背光","石材+金属","镜面不锈钢","穿孔板","磨砂玻璃","铝板","复合材料"];
let lights=["线性灯","点光源","呼吸灯","背光灯","隐藏光","动态灯带","渐变光","轮廓灯","洗墙灯","互动光"];
let structures=["中心装置","时间轴","模块拼接","悬浮球体","装置墙","层级叠加","符号图腾","数据流线","结构框架","艺术装置"];

let container=document.getElementById("result");
container.innerHTML="";

for(let i=0;i<20;i++){

let layout=layouts[i%layouts.length];
let material=materials[(i+2)%materials.length];
let light=lights[(i+3)%lights.length];
let structure=structures[(i+5)%structures.length];

let prompt=`
${name} 企业文化墙设计，
行业属性：${industry}，
核心主题：${theme}，
文化内容：${content}，
视觉风格：${style}风格，
布局：${layout}，
结构：${structure}，
材质：${material}，
灯光系统：${light}，
空间层次清晰，强化品牌表达，
室内设计表现，
正面平视视角，
完整展示，
无透视畸变，
真实可施工，
4K渲染，杰作`;

let card=document.createElement("div");
card.className="card";

card.innerHTML=`
<div class="copy" onclick="copyText(\`${prompt}\`,this)">复制</div>
<div>${i+1}. ${prompt}</div>
`;

container.appendChild(card);

}

}

function copyText(text,btn){
navigator.clipboard.writeText(text);
btn.innerText="已复制";
setTimeout(()=>btn.innerText="复制",2000);
}

</script>

</body>
</html>
